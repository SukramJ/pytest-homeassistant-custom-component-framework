name: Make Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Type of version to increment. major, minor, or patch.'
        required: true
        default: 'patch'
jobs:
  make_release:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v5
      - name: store current ha version
        id: current-ha-version
        run: echo "current-ha-version=$(cat ha_version)" >> $GITHUB_OUTPUT
      - id: next_version
        uses: zwaldowski/semver-release-action@v4
        with:
          dry_run: true
          bump: ${{ github.event.inputs.type }}
          github_token: ${{ secrets.REPO_SCOPED_TOKEN }}
      - run: echo "${{ steps.next_version.outputs.version }}" > version
      - run: echo "${{ steps.next_version.outputs.version }}"
      - id: git_commit
        run: |
          git config user.name 'SukramJ'
          git config user.email 'SukramJ@users.noreply.github.com'
          git add .
          git commit -m "Bump version"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - uses: zwaldowski/semver-release-action@v4
        with:
          github_token: ${{ secrets.REPO_SCOPED_TOKEN }}
          sha: ${{ steps.git_commit.outputs.sha }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_SCOPED_TOKEN }}
        with:
          tag_name: ${{ steps.next_version.outputs.version }}
          release_name: Release ${{ steps.next_version.outputs.version }}
          body: |
            Automatic release
            homeassistant version: ${{ steps.current-ha-version.outputs.current-ha-version }}
          draft: false
          prerelease: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine
      - name: Build
        run: |
          python setup.py sdist bdist_wheel
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
